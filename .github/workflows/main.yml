name: Build Keygen Executable

on:
  workflow_dispatch:  # 允许手动触发
  push:
    branches: [ main ]  # 当推送到 main 分支时自动触发

jobs:
  build:
    runs-on: windows-latest  # 使用 Windows 环境，生成 .exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'  # 使用 Python 3.10

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build executable
        run: pyinstaller --onefile keygen.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: keygen-exe
          path: dist/keygen.exe  # PyInstaller 默认输出到 dist 文件夹
